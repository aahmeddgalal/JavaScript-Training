<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basket Ball Counter</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="countainer">
    <h1>Match Result</h1>
    
    <div class="results">
    <div class="right">
    <div id="r-result">0</div>
    <button onclick="addOneRight()" class="add-one r">+1</button>
    <button onclick="addTwoRight()" class="add-two r">+2</button>
    <button onclick="addThreeRight()" class="add-three r">+3</button>
    </div>


    <div class="left">
    <div id="l-result">0</div>
    <button onclick="addOneLeft()" class="add-one l">+1</button>
    <button onclick="addTwoLeft()" class="add-two l">+2</button>
    <button onclick="addThreeLeft()" class="add-three l">+3</button>
    </div>
    </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
